# National
SDG_GOAL: >-
  Objectif 10 : Réduire les inégalités dans les pays et d’un pays à l’autre
SDG_TARGET: >-
  Cible 10.7 : Faciliter la migration et la mobilité de façon ordonnée, sûre, régulière et responsable, notamment par la mise en œuvre de politiques migratoires planifiées et bien gérées.
SDG_INDICATOR: >-
  Indicateur 10.7.2 : Les programmes et politiques du Canada en matière d'immigration et de réfugiés, établis et bien gérés.
STAT_CONC_DEF: >-
  L’indicateur ODD 10.7.2 vise à décrire l’état des politiques migratoires nationales et la manière dont ces politiques évoluent au fil du temps. Les informations collectées visent à identifier à la fois les progrès réalisés et les lacunes, contribuant ainsi à la base de données factuelles pour des recommandations concrètes pour la mise en œuvre de la cible 10.7 des ODD. L'indicateur sert également pour les futurs examens thématiques du Forum politique de haut niveau sur le développement durable (High-Level Political Forum on Sustainable Development (HLPF)).
  <br><br>
  L'indicateur comprend au total 30 sous-catégories, 5 pour chacun des 6 domaines/questions. 
  <br><br>
  1. Droits des migrants;
  <br>
  2. Politiques pangouvernementales fondées sur des données probantes;
  <br>
  3. Coopération et partenariats;
  <br>
  4. Bien-être socio-économique;
  <br>
  5. Dimensions de mobilité des crises;
  <br>
  6. Migration sûre, ordonnée et régulière.
  <br><br>
  Toutes les sous-catégories, à l'exception de celles relevant du domaine 1, ont des réponses dichotomiques « Oui/Non », codées « 1 » pour « Oui » 
  et « 0 » pour « Non ». Pour les sous-catégories du domaine 1, trois réponses sont possibles : « Oui, 
  quel que soit le statut d'immigration », codé « 1 » ; « Oui, uniquement pour les personnes ayant un statut d'immigration légal », codé 
  « 0,5 » ; et « Non », codé « 0 ».
  <br><br>
  Après calculs et pondération, les valeurs inférieures à 40 % sont codées comme « Nécessite des progrès supplémentaires », les valeurs comprises entre 40 % et moins de 80 % sont codées comme « Répond partiellement », les valeurs comprises entre 80 % et moins de 100 % sont codées comme « Répond », tandis que les valeurs de 100 % sont codées comme « Répond pleinement ».
